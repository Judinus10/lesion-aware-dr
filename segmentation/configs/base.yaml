project_name: lesion_aware_dr_segmentation
run_name: unet_ex_he_segmentation

paths:
  train_csv: data/processed/segmentation/train.csv
  val_csv: data/processed/segmentation/val.csv
  test_csv: data/processed/segmentation/test.csv
  outputs_dir: outputs/segmentation

model:
  name: unet
  in_channels: 3
  out_channels: 2   # [exudates, hemorrhages]
  base_channels: 32

data:
  image_size: 512
  batch_size: 4
  num_workers: 2
  pin_memory: true
  threshold: 0.5

training:
  epochs: 30
  lr: 1e-4
  weight_decay: 1e-5
  optimizer: adamw
  scheduler: cosine

loss:
  bce_weight: 0.5
  dice_weight: 0.5

logging:
  use_wandb: false
  wandb_project: lesion_aware_dr_segmentation
  wandb_entity: null

seed: 42
device: cuda